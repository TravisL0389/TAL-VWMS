<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ebe7df">
    <title>VWMS — Virtual Warehouse Management</title>
    <meta name="description" content="A flexible warehouse management system for any industry — inventory, layout, smart pull, and analytics in one place.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html, body, #root {
            height: 100%;
            margin: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ebe7df;
            color: #2b2925;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            overflow: hidden;
        }
        .mono, .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Scrollbars */
        *::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        *::-webkit-scrollbar-track {
            background: transparent;
        }
        *::-webkit-scrollbar-thumb {
            background: #c7bcae;
            border-radius: 4px;
        }
        *::-webkit-scrollbar-thumb:hover {
            background: #45a3b8;
        }

        /* Reusable input-field utility (referenced by Settings, Smart Pull, etc.) */
        .input-field {
            width: 100%;
            background-color: #f4f0e8;
            border: 1px solid #c7bcae;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
            color: #2b2925;
            outline: none;
            transition: border-color 0.15s;
        }
        .input-field:focus {
            border-color: #45a3b8;
        }
        .input-field::placeholder {
            color: #948b7d;
        }

        /* Animations */
        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .animate-scan {
            animation: scan-line 2s linear infinite;
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .animate-pulse-soft {
            animation: pulse-soft 2s ease-in-out infinite;
        }

        /* Mobile-friendly tap targets */
        @media (max-width: 640px) {
            button, a {
                min-height: 36px;
            }
        }

        /* Capacitor safe-area support for iOS notch */
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

    "react-dom": "https://esm.sh/react-dom@^19.2.3",

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
